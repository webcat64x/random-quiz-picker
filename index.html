<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quiz Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="home-page">
            <h1>🏆 Quiz Competition</h1>
            <div class="card">
                <button id="start-btn">🚀 Start & Pick Random Question</button>
            </div>
        </div>

        <div id="question-page" class="hidden">
            <div class="timer-box">
                ⏱️ Time Remaining: <span id="timer">03:00</span>
            </div>

            <h2>Selected Topic:</h2>
            <p id="topic-title" class="topic-title"></p>
            
            <h2>Question:</h2>
            <p id="question-title" class="question-title"></p>

            <div class="card">
                <button id="back-btn" class="back-btn">⬅️ Go Back to Main Page</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
