<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quiz Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏆 Quiz Competition</h1>
        
        <div class="card">
            <button id="start-btn">🚀 Start & Pick Random Question</button>
        </div>

        <div id="quiz-display" class="hidden">
            <h3>Selected Topic:</h3>
            <p id="topic-title" class="topic-title"></p>
            
            <h3>Question:</h3>
            <p id="question-title" class="question-title"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
