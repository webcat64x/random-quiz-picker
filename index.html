<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Quiz - Taxshila Central College</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="home-view" class="container">
        <div class="glow-effect"></div>
        <div class="school-header">
            <h1>Taxila Central College</h1>
            <div class="sub-header">ICT Society Presents</div>
        </div>
        
        <div class="title-wrapper">
            <h2 class="main-title">Tech Quiz Challenge</h2>
            <p class="animated-subtitle">Test your knowledge across AI, coding, hardware, and gaming!</p>
        </div>
        
        <button id="start-btn" class="glow-button"><span>Start & Pick Random Question</span></button>
    </div>

    <div id="question-view" class="container hidden">
        <div id="timer-display">Time Left: 03:00</div>
        <div id="topic-tag">Topic</div>
        <div id="question-box">Loading question...</div>
        <button id="back-btn">Back to Main Page</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
